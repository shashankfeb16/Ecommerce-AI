services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ecommerce-ai

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

    command: >
      uv run uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload